<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOL Fighting - Combat</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        /* Menu de sélection */
        #selection-screen { padding: 20px; }
        .character-list { display: flex; flex-direction: column; align-items: center; gap: 15px; margin: 20px 0; }
        .char-btn { cursor: pointer; border: 2px solid #9146ff; padding: 15px; width: 250px; background: #222; color: white; font-size: 1.1em; border-radius: 10px; }
        
        /* Arène */
        #game-area { display: none; width: 100vw; height: 100vh; max-width: 800px; max-height: 500px; margin: auto; position: relative; border: 2px solid white; background-image: url('file_0000000053c071f4b080bd74c28e535d.png'); background-size: cover; background-position: center; }
        .sprite { position: absolute; bottom: 20px; width: 200px; height: 250px; background-size: contain; background-repeat: no-repeat; transition: left 0.2s; }
        #p1 { left: 50px; }
        #p2 { right: 50px; transform: scaleX(-1); }
        
        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #222; padding: 25px; border-radius: 15px; border: 1px solid #9146ff; }
    </style>
</head>
<body>

    <!-- Menu de Sélection -->
    <div id="selection-screen">
        <h1>Choisis ton duel</h1>
        <div class="character-list">
            <button class="char-btn" onclick="start('file_0000000050bc71f4aeeb77904357e535.png', 'file_00000000e23c71f48e9542752a24d1aa.png')">Laura vs Rozuya</button>
            <button class="char-btn" onclick="start('file_00000000ee7c71f4a113d9519da87b8b.png', 'file_0000000050bc71f4aeeb77904357e535.png')">Dark vs Laura</button>
        </div>
    </div>

    <!-- Arène de Combat -->
    <div id="game-area">
        <div id="p1" class="sprite"></div>
        <div id="p2" class="sprite"></div>
        
        <!-- Bouton Options (pendant le combat) -->
        <button style="position:absolute; top:10px; right:10px; padding:10px; background:#444; color:white; border:none; cursor:pointer;" onclick="document.getElementById('opt').style.display='flex'">OPTIONS</button>
        
        <button style="position:absolute; bottom:20px; left:40%; padding:20px 40px; font-size:20px; background:#9146ff; color:white; border:none; cursor:pointer;" onclick="attaquer()">ATTAQUER</button>
    </div>

    <!-- Fenêtre Options -->
    <div id="opt" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>Commandes</h2>
            <p>PC : Touche <b>ESPACE</b> pour attaquer</p>
            <p>Mobile : Bouton <b>ATTAQUER</b> à l'écran</p>
            <button onclick="document.getElementById('opt').style.display='none'">Fermer</button>
        </div>
    </div>

    <script>
        function start(p1Img, p2Img) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('p1').style.backgroundImage = `url('${p1Img}')`;
            document.getElementById('p2').style.backgroundImage = `url('${p2Img}')`;
        }
        function attaquer() {
            const p1 = document.getElementById('p1');
            p1.style.left = "200px";
            setTimeout(() => { p1.style.left = "50px"; }, 300);
        }
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') attaquer(); });
    </script>
</body>
</html>
